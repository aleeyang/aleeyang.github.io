<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ site.url }}/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- MathJax -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="nav-inner">
                <a class="nav-brand" href="{{ "/" | relative_url }}">{{ site.title }}</a>
                <div class="nav-links">
                    <a href="{{ "/" | relative_url }}">Home</a>
                    <a href="{{ "/blog.html" | relative_url }}">Blog</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container page">
        <header class="site-hero">
            <div class="site-hero__meta">
                <h1 class="site-hero__title">{{ site.title }}</h1>
                <p class="site-hero__subtitle">{{ site.description }}</p>

                <div class="site-hero__links">
                    <a class="icon-link" href="mailto:aleeyanger@gmail.com" title="Email" aria-label="Email">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a class="icon-link" href="https://github.com/aleeyang" title="GitHub" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a class="icon-link" href="https://x.com/haha19991372305" title="Twitter" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a class="icon-link" href="https://scholar.google.com/citations?user=Greu79UAAAAJ&hl" title="Google Scholar" aria-label="Google Scholar">
                        <i class="fas fa-graduation-cap"></i>
                    </a>
                </div>
            </div>
        </header>

        <main class="content">
            {{ content }}

            <footer>
                <p class="copyright">
                    Copyright &copy;
                    <script>document.write(new Date().getFullYear())</script> Made by Yang Fu
                    <br>
                    <a href="https://github.com/mavroudisv/plain-academic">Template from Plain Academic</a>
                </p>
            </footer>
        </main>
    </div>

</body>

</html>
