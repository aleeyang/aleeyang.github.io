<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" href="{{ "/assets/img/favicon.png" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/img/favicon.png" | relative_url }}">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/bulma@0.7.5/css/bulma.min.css">
  <link rel="stylesheet" href="{{ "/style.css" | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <section class="section">
    <div class="container">
      <div class="columns">
        <aside class="column is-2_5">
          <div class="sticky profile-panel">
            <figure class="image profile-image">
              <img src="{{ "/assets/img/avatar_new.jpg" | relative_url }}" alt="{{ site.title }}">
            </figure>

            <div class="content">
              <h2 class="profile-name">{{ site.title }}</h2>
              <p>
                <b>Fudan University</b><br>
                PhD Student<br>
              </p>
            </div>

            <div class="social" aria-label="Social links">
              <a href="https://github.com/aleeyang" target="_blank" rel="noopener" aria-label="GitHub">
                <span class="fab fa-github fa-2x"></span>
              </a>
              <a href="https://scholar.google.com/citations?user=Greu79UAAAAJ&hl" target="_blank" rel="noopener" aria-label="Google Scholar">
                <span class="fa-solid fa-graduation-cap fa-2x"></span>
              </a>
              <a href="https://x.com/haha19991372305" target="_blank" rel="noopener" aria-label="Twitter">
                <span class="fab fa-twitter fa-2x"></span>
              </a>
              <a href="mailto:aleeyanger@gmail.com" aria-label="Email">
                <span class="fa-regular fa-envelope fa-2x"></span>
              </a>
            </div>

            <nav id="sidebar" class="menu sticky is-hidden-mobile" aria-label="Quick Links">
              <p class="menu-label"><b>Quick Links</b></p>
              <ul class="menu-list">
                <li><a href="{{ "/#intro" | relative_url }}">About Me</a></li>
                <li><a href="{{ "/#publications" | relative_url }}">Publications</a></li>
                <li><a href="{{ "/#awards" | relative_url }}">Awards</a></li>
                <li><a href="{{ "/#services" | relative_url }}">Services</a></li>
                <li><a href="{{ "/blog.html" | relative_url }}">Blog</a></li>
              </ul>
            </nav>

            <div class="slogon">
              <p>Welcome to my homepage!</p>
              <a class="visitor-counter" href="https://info.flagcounter.com/VPKc" target="_blank" rel="noopener" aria-label="Visitor statistics">
                <img src="https://s01.flagcounter.com/count2/VPKc/bg_FFFFFF/txt_000000/border_CCCCCC/columns_3/maxflags_12/viewers_0/labels_0/pageviews_1/flags_0/percent_0/" alt="Flag Counter">
              </a>
            </div>
          </div>
        </aside>

        <main class="column right-panel">
          <div class="content">
            {{ content }}

            <hr>
            <footer>
              <p>
                {{ site.title }}
                <a href="https://github.com/aleeyang" target="_blank" rel="noopener"><span class="fab fa-github"></span></a>
                <a href="https://scholar.google.com/citations?user=Greu79UAAAAJ&hl" target="_blank" rel="noopener"><span class="fa-solid fa-graduation-cap"></span></a>
                <a href="https://x.com/haha19991372305" target="_blank" rel="noopener"><span class="fab fa-twitter"></span></a>
              </p>
              <p>&copy; modified from <a href="https://pq-yang.github.io/" target="_blank" rel="noopener">Peiqing Yang's website</a></p>
            </footer>
          </div>
        </main>
      </div>
    </div>
  </section>
</body>

</html>
